<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TechLoja 2.0 (JSON)</title>

<script src="https://cdn.tailwindcss.com"></script>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<link rel="stylesheet" href="pratica_revisao.css">

</head>

<body>

<header class="shadow-sm">

<div class="max-w-6xl mx-auto px-6 py-5 flex justify-between items-center">

<h1 class="text-3xl font-bold">   
Genshin Store
<span class="text-blue-600">6.6</span>

</h1>


<button onclick="mostrarCarrinho()"
class="flex items-center gap-2 text-xl hover:text-blue-600">

<i class="fa-solid fa-shopping-cart"></i>

<span id="contador-carrinho"
class="text-xs rounded-full w-5 h-5 flex items-center justify-center">
0
</span>

</button>

</div>

</header>



<main class="max-w-6xl mx-auto px-6 py-8">


<input id="busca" type="text" placeholder="Buscar Produtos..." class="w-full p-4 border rounded-3xl mb-8 focus:outline-none focus:border-blue-500"

onkeyup="filtrarProdutos()">


<div id="product-grid"
class="grid grid-cols-1 md:grid-cols-3 lg:grid-cols-4 gap-6">

</div>

</main>

<div id="modal-carrinho"

onclick="if(event.target.id === 'modal-carrinho') fecharCarrinho()"

class="hidden fixed inset-0 flex items-center justify-center z-50">

<div onclick="event.stopImmediatePropagation()"

class="rounded-3xl max-w-md w-full mx-4 max-h-[80vh] overflow-auto">

<div class="p-6">

<div class="flex justify-between items-center mb-4">

<h2 class="text-2xl font-semibold">
Seu Carrinho
</h2>

<button onclick="fecharCarrinho()"
class="text-3xl leading-none">
x
</button>

</div>

<div id="carrinho-itens"
class="space-y-4">
</div>

<div class="mt-6 pt-4 border-t">

<div class="flex justify-between font-bold text-xl">

<span>Total</span>

<span id="carrinho-total">
R$ 0,00
</span>

</div>

<button onclick="finalizarCompra()"
 
class="mt-4 w-full hover:bg-emerald-700 text-white py-4 rounded-3xl font-semibold">

Finalizar Compra

</button>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>

</html>
